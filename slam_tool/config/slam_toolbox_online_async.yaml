slam_toolbox:
  ros__parameters:
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /scan
    use_map_saver: true
    mode: mapping

    # 【核心修改】將地圖解析度改為 0.01 公尺（1公分一格）
    resolution: 0.01

    # Match YDLIDAR hardware limits and avoid invalid near-field data.
    min_laser_range: 0.2
    max_laser_range: 20.0

    # Stability-first tuning for Raspberry Pi: reduce scan processing pressure.
    throttle_scans: 4
    minimum_time_interval: 0.2
    map_update_interval: 3.0
    minimum_travel_distance: 0.05
    minimum_travel_heading: 0.10
    enable_interactive_mode: false
    do_loop_closing: false
    transform_timeout: 0.5
    tf_buffer_duration: 30.0

    # Make subscription compatible with SensorDataQoS (best effort) publishers.
    qos_overrides:
      "/scan":
        subscription:
          reliability: best_effort
          history: keep_last
          depth: 10
          durability: volatile
